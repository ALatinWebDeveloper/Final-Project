<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <title>Document</title>
</head>
<body>
    <header>
        <img src="./images/pokeLogo.png" alt="Logo" height="75px">
        <input type="text" placeholder="Search...">
    </header>
    <main>
        <div class="filters">
            <button>Placeholder</button>
            <button>Placeholder</button>
            <button>Placeholder</button>
            <button>Placeholder</button>
            <button class="filterAll">Remove</button>
        </div>
        <div id="pokedex">
        </div>
    </main>
    <aside class="pkm_profile">
            <div class="profile_header">
                <img class="prof_img" src="./images/pokeLogo.png">
                <div class="gender">
                    <img class="maleBtn" src="./images/gender_imgm.png" alt="male">
                    <img class="femBtn" src="./images/gender_imgf.png" alt="female">
                </div>
            </div>
            <div class="profile_body">
            
                <h2 class="pkm_name"></h2>
                <h3>POKÉDEX ENTRY</h3>
            
                <h3>ABILITIES</h3>
                <div class="abilities">
                </div>
            
                <div class="pkm_carac">
            
                    <div class="feature">
                        <h3>HEIGHT</h3>
                    </div>
            
                    <div class="feature">
                        <h3>WEIGHT</h3>
                    </div>
            
                    <div class="feature">
                        <h3>WEAKNESSES</h3>
                        <div class="weakness">
                            <img src="./images/type_icons/Fire type.ico" alt="fire type icon">
                            <img src="./images/type_icons/Poison type.ico" alt="posion type icon">
                            <img src="images/type_icons/Bug type.ico" alt="bug type icon">
                        </div>
                    </div>
            
                    <div class="feature">
                        
                    </div>
                </div>
            
                <h3>STATS</h3>
                <div class="stats">
                    
                </div>
            </div>
    </aside>
    <footer>
        Hey
    </footer>
    <script type="module" src="./scripts/main.mjs"></script>
</body>
</html>
