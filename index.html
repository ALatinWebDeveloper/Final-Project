<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="icon" type="image/x-icon" href="./images/pokeLogo.ico">
    <title>Pokedex</title>
</head>
<body>
    <header>
        <img src="./images/pokeLogo.png" alt="Logo" height="75px">
        <div class="search-container">
            <input type="text" id="pokemonName" placeholder="Busca un pokemon (ej: pika...)" autocomplete="off">
            <div id="suggestions" class="suggestions-list hide"></div>
        </div>
    </header>
    <main>
        <div class="filters">
                <button class="pkm_type normal" id="normal">Normal</button>
                <button class="pkm_type fire" id="fire">Fire</button>
                <button class="pkm_type water" id="water">Water</button>
                <button class="pkm_type grass" id="grass">Grass</button>
                <button class="pkm_type electric" id="electric">Electric</button>
                <button class="pkm_type ice" id="ice">Ice</button>
                <button class="pkm_type fighting" id="fighting">Fighting</button>
                <button class="pkm_type poison" id="poison">Poison</button>
                <button class="pkm_type ground" id="ground">Ground</button>
                <button class="pkm_type flying" id="flying">Flying</button>
                <button class="pkm_type psychic" id="psychic">Psychic</button>
                <button class="pkm_type bug" id="bug">Bug</button>
                <button class="pkm_type rock" id="rock">Rock</button>
                <button class="pkm_type ghost" id="ghost">Ghost</button>
                <button class="pkm_type dragon" id="dragon">Dragon</button>
                <button class="pkm_type steel" id="steel">Steel</button>
                <button class="pkm_type fairy" id="fairy">Fairy</button>
                <button class="favoriteFilter">Favorite</button>
                <img class="filterAll" src="./images/clar_filters.png" alt="">
        </div>
        <div id="pokedex">
        </div>
    </main>
    <aside class="pkm_profile">
            <div class="profile_header">
                <img class="prof_img" src="./images/pokeLogo.png">
                <div class="playBtns">
                    <img class="maleBtn" src="./images/play.png" alt="play">
                    <img class="femBtn" src="./images/stop.png" alt="stop">
                </div>
            </div>
            <div class="profile_body">
            
                <h2 class="pkm_name"></h2>
                <h3>POKÉDEX ENTRY</h3>
            
                <h3>ABILITIES</h3>
                <div class="abilities">
                </div>
            
                <div class="pkm_carac">
            
                    <div class="feature">
                        <h3>HEIGHT</h3>
                    </div>
            
                    <div class="feature">
                        <h3>WEIGHT</h3>
                    </div>
            
                    <div class="feature">
                        <h3>WEAKNESSES</h3>
                        <div class="weakness">
                            <img src="./images/type_icons/Fire type.ico" alt="fire type icon">
                            <img src="./images/type_icons/Poison type.ico" alt="posion type icon">
                            <img src="images/type_icons/Bug type.ico" alt="bug type icon">
                        </div>
                    </div>
            
                    <div class="feature">
                        
                    </div>
                </div>
            
                <h3>STATS</h3>
                <div class="stats">
                    
                </div>
            </div>
    </aside>
    <footer>
        <h5>Created by Juan Betancourt - 2026</h5>
        <p>Not affiliated with Nintendo or Game Freak, this is a practice project for learning purposes only. All rights to the
        Pokémon franchise belong to their respective owners.</p>
    </footer>
    <script type="module" src="./scripts/main.mjs"></script>
</body>
</html>
